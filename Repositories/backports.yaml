# Backport Configuration
# Maps repositories to their default branch and active release branches.
#
# Used by the backport prompt (.github/prompts/backport.prompt.md) to determine
# which branches a PR should be cherry-picked to.
#
# Branch naming conventions:
#   canonical/k8s-snap family:      release-{major}.{minor}   (e.g. release-1.32)
#   canonical/microk8s:             {major}.{minor}            (e.g. 1.32)
#   charmed-kubernetes/*:           release_{major}.{minor}    (e.g. release_1.32)
#   canonical/k8s-snap-api:         v{major}.{minor}           (e.g. v1.2)
#
# Only list branches that are actively maintained.
# Remove EOL branches periodically.
#
# Last updated: 2026-04-13

organizations:
  # ──────────────────────────────────────────────
  # canonical
  # ──────────────────────────────────────────────
  - name: canonical
    repositories:
      - repo: k8s-snap
        default-branch: main
        release-branches:
          - release-1.32
          - release-1.33
          - release-1.34
          - release-1.35

      - repo: k8s-operator
        default-branch: main
        release-branches:
          - release-1.32
          - release-1.33
          - release-1.34
          - release-1.35

      - repo: k8s-snap-api
        default-branch: main
        release-branches:
          - v1.1
          - v1.2

      - repo: k8s-dqlite
