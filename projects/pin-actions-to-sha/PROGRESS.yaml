# Pin Actions to SHA — Progress Tracker
# Tracks every repository processed, PRs created, and status.
#
# Statuses:
#   pr-open       — PR created and awaiting review/merge
#   already-pinned — All actions were already pinned to SHAs
#   no-workflows  — Repo has no GitHub Actions workflow files
#   no-github-dir — Repo has no .github/ directory
#   archived      — Repository is archived on GitHub
#   missing-permissions — No push access (403)
#   skipped       — Skipped for other reasons (private, mx-prefix, etc.)
#   todo          — Not yet processed

