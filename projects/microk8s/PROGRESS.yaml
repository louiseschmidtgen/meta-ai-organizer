project: microk8s
repo: canonical/microk8s
fork: louiseschmidtgen/microk8s-1
branch: python-3.10-bump
clone: /tmp/microk8s-python-bump
pr: https://github.com/canonical/microk8s/pull/5453
status: merged

ci:
  cla-check: pass
  lint-code: pass
  unit-tests: pass

tasks:
  - name: python-3.10-bump
    status: merged
    commit: "ci: bump Python to 3.10 and pin actions to SHA"
    changes:
      - file: .github/workflows/build-installer.yml
        what: python-version 3.8 → 3.10, step name updated
      - file: .github/actions/test-prep/action.yaml
        what: >
          setup-python v5 (a26af69b) → v6.2.0 (a309ff8b),
          download-artifact v4 (d3f86a10) → v8 (3e5f45b2)
      - file: pyproject.toml
        what: black target-version py35 → py310
      - file: tox.ini
        what: >
          black 21.4b2 → 24.10.0 (supports py310),
          drop click==7.1.2 pin (no longer needed),
          add .tox_env to black exclude pattern
      - file: installer/requirements.txt
        what: >
          removed dead pysha3 conditional (python_version < 3.6),
          replaced cp38 PyYAML wheel URL with PyYAML==6.0.2 from PyPI
      - file: installer/common/file_utils.py
        what: "black 24.10.0 reformat: 2**20 spacing"
      - file: installer/vm_providers/errors.py
        what: "black 24.10.0 reformat: trailing commas"
      - file: installer/vm_providers/_multipass/_multipass_command.py
        what: "black 24.10.0 reformat: trailing commas"

  - name: pin-actions-to-sha
    status: already-pinned
    note: >
      All 31 external GitHub Actions were already SHA-pinned.
      Updated 2 stale SHAs in test-prep composite action.

  - name: containerd-cve-2024-25621-backport
    status: open
    cve: CVE-2024-25621
    original-pr: https://github.com/canonical/microk8s/pull/5406
    note: >
      Backport containerd bump to v1.7.29 (patched version for CVE-2024-25621)
      across release branches 1.30–1.34 + strict variants.
      Original PR bumped master from v2.1.3 to v2.1.6; release branches
      use containerd v1.6.x/v1.7.x so v1.7.29 is the correct patch target.
    backports:
      - branch: "1.30"
        pr: https://github.com/canonical/microk8s/pull/5458
        from: v1.6.28
        to: v1.7.29
        status: open
      - branch: "1.31"
        pr: https://github.com/canonical/microk8s/pull/5459
        from: v1.6.28
        to: v1.7.29
        status: open
      - branch: "1.32"
        pr: https://github.com/canonical/microk8s/pull/5460
        from: v1.6.36
        to: v1.7.29
        status: open
      - branch: "1.33"
        pr: https://github.com/canonical/microk8s/pull/5461
        from: v1.7.27
        to: v1.7.29
        status: open
      - branch: "1.34"
        pr: https://github.com/canonical/microk8s/pull/5462
        from: v1.7.28
        to: v1.7.29
        status: open
      - branch: "1.30-strict"
        pr: https://github.com/canonical/microk8s/pull/5463
        from: v1.6.28
        to: v1.7.29
        status: open
      - branch: "1.31-strict"
        pr: https://github.com/canonical/microk8s/pull/5464
        from: v1.6.28
        to: v1.7.29
        status: open
      - branch: "1.32-strict"
        pr: https://github.com/canonical/microk8s/pull/5465
        from: v1.6.36
        to: v1.7.29
        status: open
      - branch: "1.33-strict"
        pr: https://github.com/canonical/microk8s/pull/5466
        from: v1.7.27
        to: v1.7.29
        status: open
      - branch: "1.34-strict"
        pr: https://github.com/canonical/microk8s/pull/5467
        from: v1.7.28
        to: v1.7.29
        status: open

  - name: containerd-cve-2024-25621-k8s-snap
    status: open
    cve: CVE-2024-25621
    repo: canonical/k8s-snap
    note: >
      Only release-1.32 (v1.6.39) was vulnerable.
      main (v2.1.6), release-1.33 (v1.7.30), release-1.34 (v1.7.30),
      and release-1.35 (v2.1.5) are already on patched versions.
    backports:
      - branch: release-1.32
        pr: https://github.com/canonical/k8s-snap/pull/2531
        from: v1.6.39
        to: v1.7.29
        status: open

files_not_changed:
  - path: snap/snapcraft.yaml
    reason: Already references python3.10 (libpython3.10, python3.10-minimal, etc.)
  - path: microk8s-resources/actions/common/utils.sh
    reason: Already sets PYTHONPATH to python3.10
  - path: .github/workflows/check-formatting.yml
    reason: Uses system tox, no explicit python-version
  - path: .github/workflows/check-unit-tests.yml
    reason: Uses system tox/pip3, no explicit python-version
