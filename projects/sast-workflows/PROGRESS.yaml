# SAST Workflows — Progress Tracker
# Tracks semgrep, bandit, and dependency pinning rollout across all repositories.
#
# Three tasks per repo:
#   semgrep     — Semgrep SAST workflow (all repos)
#   bandit      — Bandit Python SAST (Python repos only)
#   dep-pinning — Pin pip dependencies with hash verification (repos using pip in CI)
#
# Task statuses:
#   todo          — Not yet processed
#   pr-open       — PR created and awaiting review/merge
#   merged        — PR merged
#   not-applicable — Tool does not apply (e.g. bandit on a Go-only repo)
#   no-github-dir — Repo has no .github/ directory
#   no-workflows  — Repo has no workflow files
#   missing-permissions — No push access (403)
#   skipped       — Skipped for other reasons
#
# Reference PRs (k8s-snap pilot):
#   Semgrep:      https://github.com/canonical/k8s-snap/pull/2468
#   Bandit:       https://github.com/canonical/k8s-snap/pull/2466
#   Dep pinning:  https://github.com/canonical/k8s-snap/pull/2492
#
# Language detection (via GitHub API, 2026-04-08):
#   139 repos have Python → bandit: todo
#    32 repos have no Python → bandit: not-applicable

started: 2026-04-08

